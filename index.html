<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>how sus are you? 🕵️</title>
  <style>
    :root{
      --bg: #0f1220;
      --card: #171a2b;
      --text: #e9ebff;
      --muted: #a7add6;
      --accent: #7c8eff;
      --p: 0;        /* percent 0–100 for the meter */
      --hue: 120;    /* 120 (green) → 0 (red) */
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", sans-serif;
      color:var(--text);
      background:
        radial-gradient(60% 60% at 20% 10%, #1a1f3a 0%, rgba(26,31,58,0) 60%),
        radial-gradient(60% 60% at 80% 90%, #0b0f2a 0%, rgba(11,15,42,0) 60%),
        var(--bg);
      display:grid;
      place-items:center;
      padding:24px;
    }
    body.sunny-mode{
      background:
        radial-gradient(60% 60% at 15% 10%, rgba(127, 198, 80, 0.42) 0%, rgba(127, 198, 80, 0) 60%),
        radial-gradient(70% 70% at 85% 90%, rgba(109, 78, 43, 0.5) 0%, rgba(109, 78, 43, 0) 60%),
        linear-gradient(160deg, #3f7f33 0%, #6d4e2b 100%);
    }
    body.cody-mode{
      background:
        radial-gradient(65% 65% at 18% 14%, rgba(128, 255, 112, 0.45) 0%, rgba(128, 255, 112, 0) 62%),
        radial-gradient(70% 70% at 84% 86%, rgba(112, 72, 34, 0.55) 0%, rgba(112, 72, 34, 0) 62%),
        linear-gradient(160deg, #2f7a2c 0%, #5e3a1f 100%);
    }
    body.delanie-mode{
      animation: delanie-flash 0.16s steps(1, end) infinite;
    }
    @keyframes delanie-flash{
      0%, 49%{ background:#000; color:#fff; }
      50%, 100%{ background:#fff; color:#000; }
    }
    body.light-mode{
      --bg: #eef2ff;
      --card: #ffffff;
      --text: #171a2b;
      --muted: #5d678e;
      background:
        radial-gradient(60% 60% at 20% 10%, #dfe6ff 0%, rgba(223,230,255,0) 60%),
        radial-gradient(60% 60% at 80% 90%, #e8edf9 0%, rgba(232,237,249,0) 60%),
        var(--bg);
    }
    .card{
      width:min(720px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius:20px;
      padding:24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .card.fly-away{
      animation: card-fly-away 6s ease-in-out;
    }
    @keyframes card-fly-away{
      0%{
        transform: translateY(0) rotate(0deg) scale(1);
        opacity:1;
      }
      50%{
        transform: translateY(-145vh) rotate(-14deg) scale(0.8);
        opacity:1;
      }
      100%{
        transform: translateY(0) rotate(0deg) scale(1);
        opacity:1;
      }
    }
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px}
    #theme-toggle{padding:10px 12px; font-size:.9rem}
    body.light-mode .card{
      border:1px solid rgba(20,30,60,0.12);
      box-shadow: 0 20px 50px rgba(31,44,84,0.15);
    }
    body.light-mode input[type="text"]{
      background:#f6f8ff;
      border:1px solid rgba(28,40,84,0.2);
      color:var(--text);
    }
    body.light-mode input::placeholder{color:#7b86b2}
    body.light-mode .ghost{
      background:#f6f8ff;
      border:1px solid rgba(28,40,84,0.2);
      color:var(--text);
    }
body.light-mode .ring{
  --track: #c7ccd8;
}
body.light-mode .ring::after{
  background:#edf0f6;
  border:1px solid rgba(58,66,90,0.2);
  box-shadow: inset 0 0 0 8px rgba(255,255,255,0.5);
}
    h1{
      margin:0 0 10px;
      font-size: clamp(1.4rem, 1rem + 2vw, 2.2rem);
      letter-spacing: .2px;
    }
    p.sub{margin:0 0 18px; color:var(--muted)}
    form label{display:block; margin-bottom:8px; color:var(--muted); font-size:.95rem}
    .row{display:flex; gap:10px}
    input[type="text"]{
      flex:1;
      background:#0f1327;
      border:1px solid rgba(255,255,255,0.12);
      color:var(--text);
      border-radius:12px;
      padding:14px 16px;
      outline:none;
      font-size:1rem;
    }
    input::placeholder{color:#7c82b5}
    button{
      background:linear-gradient(180deg, hsl(250 100% 70%), hsl(250 100% 62%));
      color:white;
      border:0;
      padding:14px 16px;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
      transition: transform .06s ease;
    }
    button:hover{transform: translateY(-1px)}
    button:active{transform: translateY(0)}
    .hidden{display:none}

    /* result section */
    #result{
      margin-top:22px;
      display:grid;
      gap:18px;
      grid-template-columns: 220px 1fr;
      align-items:center;
    }
    @media (max-width: 640px){
      #result{grid-template-columns: 1fr}
    }

    .meter{
      width:220px;
      aspect-ratio:1/1;
      display:grid;
      place-items:center;
      position:relative;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.35));
    }
    /* conic progress ring */
    .ring{
      --track:#22263f;
      --fill: hsl(var(--hue) 90% 55%);
      width:100%;
      height:100%;
      border-radius:50%;
      background:
        conic-gradient(var(--fill) calc(var(--p)*1%), var(--track) 0);
      display:grid;
      place-items:center;
      transition: background 600ms ease;
    }
    .ring.rainbow{
      --track: rgba(34,38,63,0.35);
      background: conic-gradient(#ff004d 0deg, #ff7a00 51deg, #ffee00 102deg, #00d84a 153deg, #00cfff 204deg, #3050ff 255deg, #9b3dff 306deg, #ff004d 360deg);
      animation: spin-rainbow 2.2s linear infinite;
    }
    .ring.chicken{
      --track: #332511;
      --fill: #ff8a00;
      animation: none;
    }
    .ring.monkey{
      --track: #2f2216;
      --fill: #8b5a2b;
      animation: none;
    }
    .ring.zain-split{
      --track: rgba(34,38,63,0.35);
      background: linear-gradient(90deg, #ffd83d 0 42%, #d0e25d 50%, #2c71ff 58% 100%);
      animation:none;
    }
    #monkey-float{
      position:fixed;
      inset:0;
      z-index:10010;
      pointer-events:none;
      overflow:hidden;
    }
    .monkey-floater{
      position:absolute;
      top:-12vh;
      font-size:clamp(1.4rem, 3vw, 2.2rem);
      animation: monkey-drift linear forwards;
      user-select:none;
    }
    @keyframes monkey-drift{
      from{ transform: translate3d(0, 105vh, 0) rotate(0deg); opacity:.95; }
      to{ transform: translate3d(0, -18vh, 0) rotate(16deg); opacity:0; }
    }
    #bella-float{
      position:fixed;
      inset:0;
      z-index:10011;
      pointer-events:none;
      overflow:hidden;
    }
    .bella-floater{
      position:absolute;
      top:-12vh;
      font-size:clamp(1.2rem, 2.8vw, 2rem);
      animation: bella-drift linear forwards;
      user-select:none;
    }
    @keyframes bella-drift{
      from{ transform: translate3d(0, 105vh, 0) rotate(0deg); opacity:.96; }
      to{ transform: translate3d(0, -18vh, 0) rotate(-16deg); opacity:0; }
    }
    #zain-float{
      position:fixed;
      inset:0;
      z-index:10012;
      pointer-events:none;
      overflow:hidden;
    }
    .zain-floater{
      position:absolute;
      top:-12vh;
      font-size:clamp(1.2rem, 2.8vw, 2rem);
      animation: zain-drift linear forwards;
      user-select:none;
    }
    @keyframes zain-drift{
      from{ transform: translate3d(0, 105vh, 0) rotate(0deg); opacity:.96; }
      to{ transform: translate3d(0, -18vh, 0) rotate(18deg); opacity:0; }
    }
    @keyframes spin-rainbow{
      to { transform: rotate(360deg); }
    }
    .ring::after{
      content:"";
      width:70%;
      height:70%;
      background:var(--card);
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 0 8px rgba(255,255,255,0.03);
    }
    .center{
      position:absolute;
      text-align:center;
    }
    .percent{
      font-size:2.4rem;
      font-weight:800;
      line-height:1;
    }
    .label{color:var(--muted); margin-top:6px}

    .stack{display:grid; gap:8px}
    .verdict{
      font-size:1.2rem;
      font-weight:700;
    }
    .desc{color:var(--muted)}
    .actions{display:flex; gap:10px; margin-top:6px}
    .ghost{
      background:#0f1327;
      border:1px solid rgba(255,255,255,0.12);
    }
    .note{color:var(--muted); font-size:.9rem; margin-top:6px}

    #chicken-overlay{

      inset:0;
      z-index:9999;
      display:none;
      pointer-events:none;

#fate-overlay{

}
#again.corner-run{

    // deterministic hash → 0..100
    function djb2(str){
      let h = 5381;
      for (let i=0;i<str.length;i++){
        h = ((h << 5) + h) ^ str.charCodeAt(i);
      }
      return Math.abs(h);
    }
    function normalizeName(name){
      return (name || '').trim().toLowerCase().replace(/[’‘`´]/g, "'");
    }
    function nameToPercent(name){
      if(!name) return 0;
      const h = djb2(normalizeName(name));
      return h % 101; // 0..100
    }
    function percentToHue(p){
      // 120 (green) → 0 (red)
      return Math.round(120 - (120 * (p/100)));
    }
    function verdictFor(p){
      if (p <= 15) return ["innocent fr 🕊️", "zero impostor energy. carry on, king."];
      if (p <= 35) return ["ehhh watchin' u 👀", "nothing major… yet. we see u tho."];

      if (p <= 85) return ["big sus ⚠️", "alarms pinging. u got explaining to do."];
      return ["impostor energy 🚨", "red is following u in electrical, bro."];
    }

    function applyTheme(mode){
      const light = mode === 'light';
      body.classList.toggle('light-mode', light);
      themeToggleBtn.textContent = light ? 'dark mode' : 'light mode';
      localStorage.setItem('themeMode', light ? 'light' : 'dark');
    }

    function animateTo(meterTarget, finalDisplayPercent, finalLabel){
      // animate CSS var --p to the visual meter target (0..100)
      const start = parseFloat(getComputedStyle(ring).getPropertyValue('--p')) || 0;
      const startTime = performance.now();
      const duration = 800; // ms
      function frame(now){
        const t = Math.min(1, (now - startTime) / duration);
        const cur = Math.round(start + (meterTarget - start) * t);
        ring.style.setProperty('--p', cur);
        ring.style.setProperty('--hue', percentToHue(cur));
        percentEl.textContent = finalLabel || (cur + "%");
        if (t < 1) {
          requestAnimationFrame(frame);
          return;
        }
        percentEl.textContent = finalLabel || (finalDisplayPercent + "%");
      }
      requestAnimationFrame(frame);
    }

    function openSecretPage(){

function runSlowErase(){
  if (eraseTimer) {
    clearInterval(eraseTimer);
    eraseTimer = null;
  }
  if (typeTimer) {
    clearInterval(typeTimer);
    typeTimer = null;
  }

  eraseTimer = setInterval(()=>{
    if (!input.value) {
      clearInterval(eraseTimer);
      eraseTimer = null;

      const target = 'STOP TRYING!';
      let i = 0;
      typeTimer = setInterval(()=>{
        i += 1;
        input.value = target.slice(0, i);
        if (i >= target.length) {
          clearInterval(typeTimer);
          typeTimer = null;
        }
      }, 120);
      return;
    }
    input.value = input.value.slice(0, -1);
  }, 140);
}

function startMonkeyFloat(){

  const total = 26;
  for (let i = 0; i < total; i++) {
    const floater = document.createElement('span');
    floater.className = 'monkey-floater';

    floater.style.animationDuration = (5.5 + Math.random() * 4.5).toFixed(2) + 's';
    floater.style.animationDelay = (Math.random() * 1.8).toFixed(2) + 's';
    floater.style.opacity = String(0.72 + Math.random() * 0.28);
    floater.addEventListener('animationend', ()=> floater.remove(), { once: true });
    monkeyFloat.appendChild(floater);
  }

  if (monkeyFloatTimer) {
    clearTimeout(monkeyFloatTimer);
  }
  monkeyFloatTimer = setTimeout(()=>{

againBtn.addEventListener('click', ()=>{
  if (fateLockActive) return;

  if (againBtn.classList.contains('again-melting')) {
    triggerMeltingAftermath();
    return;
  }

  const current = normalizeName(input.value);
  const sameName = !!lastScannedNormalized && (current === lastScannedNormalized || againCountForName >= 3);

  if (!sameName) {
    againCountForName = 0;
    againBtn.classList.remove('corner-run');
    input.focus();
    input.select();
    return;
  }

  againCountForName += 1;

  if (againCountForName <= 2) {
    input.focus();
    input.select();
    return;
  }

  if (againCountForName === 3) {
    reasonEl.textContent = 'YOU CANNOT CHANGE YOUR FATE';
    return;
  }

  if (againCountForName === 4) {
    reasonEl.textContent = 'YOU CANNOT CHANGE YOUR FATE!';
    runSlowErase();
    return;
  }

    reasonEl.textContent = 'YOU CANNOT CHANGE YOUR FATE!';
    againBtn.classList.add('corner-run');
    return;
  }

  triggerFateLock();
